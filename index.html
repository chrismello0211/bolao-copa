<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0B1A11">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bolão Copa 26">
<title>Bolão da Família · Copa 2026</title>
<link rel="icon" type="image/png" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<link rel="manifest" href="manifest.json">
<style>
:root{
  --fundo:#0B1A11; --card:#142A1B; --card-alto:#1C3624;
  --borda:rgba(242,239,230,.09);
  --giz:#F2EFE6; --giz-suave:rgba(242,239,230,.62); --giz-apagado:rgba(242,239,230,.38);
  --ouro:#F4C84B; --ouro-fundo:rgba(244,200,75,.13);
  --verde:#34C77B; --verde-fundo:rgba(52,199,123,.14);
  --vermelho:#E5544D; --vermelho-fundo:rgba(229,84,77,.13);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html{height:100%}
body{
  min-height:100%;
  background:radial-gradient(1200px 500px at 50% -120px,#16301d 0%,var(--fundo) 55%) var(--fundo);
  color:var(--giz);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',Roboto,sans-serif;
  -webkit-font-smoothing:antialiased;
}
button,input,select{font-family:inherit;font-size:inherit;color:inherit}
button{cursor:pointer;border:none;background:none}
@keyframes girar{to{transform:rotate(360deg)}}
@keyframes subir{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulsar{0%,100%{opacity:1}50%{opacity:.35}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

.wrap{max-width:560px;margin:0 auto;padding:0 16px}
.eyebrow{font-size:11px;font-weight:700;letter-spacing:.22em;color:var(--ouro)}
.sec-title{font-size:11px;font-weight:700;letter-spacing:.18em;color:var(--ouro);margin:0 0 10px}
.suave{color:var(--giz-suave)} .apagado{color:var(--giz-apagado)}

/* ---------- Cabeçalho ---------- */
.hd{position:sticky;top:0;z-index:20;background:rgba(11,26,17,.88);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid var(--borda)}
.hd-in{display:flex;align-items:center;gap:10px;padding:12px 16px;max-width:560px;margin:0 auto}
.hd-tit{flex:1;min-width:0}
.hd-tit .eyebrow{font-size:9.5px;letter-spacing:.2em;display:flex;align-items:center;gap:6px}
.hd-tit b{font-size:17px;font-weight:800;letter-spacing:-.01em;display:block}
.dot{width:7px;height:7px;border-radius:50%;background:var(--verde);display:inline-block}
.dot.off{background:#d9a13b;animation:pulsar 1.2s ease infinite}
.pill{display:flex;align-items:center;gap:7px;padding:5px 11px 5px 5px;border-radius:999px;
  border:1px solid var(--borda);background:var(--card);font-size:13px;font-weight:700;max-width:140px}
.pill span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ---------- Componentes ---------- */
.card{background:var(--card);border:1px solid var(--borda);border-radius:18px;padding:14px}
.patch{width:34px;height:34px;border-radius:50%;background:var(--ouro-fundo);
  border:1px solid rgba(244,200,75,.45);color:var(--ouro);display:flex;align-items:center;
  justify-content:center;font-weight:800;font-size:15px;flex-shrink:0}
.patch.sm{width:28px;height:28px;font-size:12px}
.avatar{border-radius:50%;color:#10160F;display:flex;align-items:center;justify-content:center;
  font-weight:800;flex-shrink:0;border:2px solid rgba(242,239,230,.85);
  box-shadow:inset 0 -2px 4px rgba(0,0,0,.25),0 1px 2px rgba(0,0,0,.4)}

.tgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.tbtn{position:relative;display:flex;flex-direction:column;align-items:center;gap:6px;
  padding:12px 6px 10px;border-radius:14px;background:var(--card-alto);
  border:1.5px solid var(--borda);min-height:74px;transition:border-color .15s,background .15s}
.tbtn.sel{background:var(--ouro-fundo);border-color:var(--ouro)}
.tbtn.sel2{background:rgba(185,194,204,.12);border-color:#B9C2CC}
.tbtn .tflag{font-size:27px;line-height:1}
.tbtn .tname{font-size:12.5px;font-weight:600;text-align:center;line-height:1.15}
.tbtn .twin{position:absolute;top:5px;right:7px;font-size:13px}
.tbtn .tcheck{position:absolute;top:5px;left:7px;font-size:10px;font-weight:800;color:var(--ouro)}
.tbtn.sel2 .tcheck{color:#C9D2DC}

.gcab{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.gcab b{font-weight:800;font-size:15px;display:block}
.gcab small{font-size:12px;display:block}

.btn{padding:15px;border-radius:14px;font-size:16px;font-weight:800;width:100%}
.btn-gold{background:var(--ouro);color:#15240F}
.btn-gold:disabled{background:rgba(244,200,75,.25);cursor:default}
.icobtn{width:38px;height:38px;border-radius:12px;border:1px solid var(--borda);
  background:var(--card);font-size:17px;display:flex;align-items:center;justify-content:center}

.input{width:100%;padding:15px 16px;border-radius:14px;border:1.5px solid var(--borda);
  background:var(--card);color:var(--giz);font-size:17px;outline:none}
.input:focus{border-color:rgba(244,200,75,.6)}
select.sel-camp{width:100%;padding:13px 14px;border-radius:12px;background:var(--card-alto);
  border:1.5px solid var(--borda);font-size:15px;font-weight:600;-webkit-appearance:none;appearance:none}
select.sel-camp.tem{border-color:var(--ouro)}
select.sel-camp:not(.tem){color:var(--giz-apagado)}

.chip{display:flex;align-items:center;gap:6px;padding:5px 10px 5px 6px;border-radius:999px;
  font-size:12.5px;font-weight:600;background:var(--card-alto);border:1px solid var(--borda);
  color:var(--giz-suave)}
.chip.ok{background:var(--verde-fundo);border-color:rgba(52,199,123,.5);color:var(--verde)}
.chip.bad{background:var(--vermelho-fundo);border-color:rgba(229,84,77,.45);color:var(--vermelho)}
.chip .seg{display:flex;align-items:center;gap:3px}
.chip .seg b{font-size:10px;font-weight:800;opacity:.75}
.chip .seg.ok{color:var(--verde)}
.chip .seg.bad{color:var(--vermelho)}
.chip .sepd{opacity:.35}

.rank{display:flex;align-items:center;gap:12px;background:var(--card);
  border:1px solid var(--borda);border-radius:16px;padding:12px 14px}
.rank.lider{background:var(--ouro-fundo);border-color:rgba(244,200,75,.4)}
.rank .pos{width:26px;text-align:center;font-size:16px}
.rank .pos i{font-style:normal;color:var(--giz-apagado);font-weight:700;font-size:14px}
.rank .info{flex:1;min-width:0}
.rank .info b{font-size:15px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rank .info small{font-size:12px;color:var(--giz-suave)}
.rank .pts{text-align:right}
.rank .pts b{font-size:22px;font-weight:800;color:var(--ouro);font-variant-numeric:tabular-nums;line-height:1;display:block}
.rank .pts small{font-size:10px;color:var(--giz-apagado);letter-spacing:.08em}

.note{background:var(--card);border:1px dashed var(--borda);border-radius:14px;
  padding:11px 14px;font-size:12.5px;color:var(--giz-suave);line-height:1.5}
.aviso{background:var(--ouro-fundo);border:1px solid rgba(244,200,75,.35);border-radius:14px;
  padding:12px 14px;font-size:13px;line-height:1.5}

/* ---------- Barras fixas ---------- */
.savebar{position:fixed;left:0;right:0;bottom:calc(env(safe-area-inset-bottom,0px) + 62px);
  z-index:25;padding:0 12px;display:none}
.savebar.on{display:block}
.savebar-in{max-width:536px;margin:0 auto;background:rgba(20,42,27,.95);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border:1px solid var(--borda);border-radius:16px;padding:10px 12px;
  display:flex;align-items:center;gap:10px;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.savebar-in .st{flex:1;font-size:12.5px;color:var(--giz-suave);line-height:1.3}
.savebar-in button{padding:11px 18px;border-radius:12px;background:var(--ouro);
  color:#15240F;font-size:14px;font-weight:800;white-space:nowrap}
.savebar-in button:disabled{background:rgba(244,200,75,.25)}

.toast{position:fixed;left:0;right:0;display:flex;justify-content:center;z-index:30;
  pointer-events:none;bottom:calc(env(safe-area-inset-bottom,0px) + 74px);transition:bottom .2s}
.toast.alto{bottom:calc(env(safe-area-inset-bottom,0px) + 132px)}
.toast>div{background:#1E3D2B;border:1px solid rgba(52,199,123,.5);color:var(--giz);
  padding:10px 18px;border-radius:999px;font-size:13.5px;font-weight:600;
  box-shadow:0 8px 20px rgba(0,0,0,.45);animation:subir .25s ease}
.toast.erro>div{background:var(--vermelho);border-color:rgba(255,255,255,.25)}

.tabbar{position:fixed;left:0;right:0;bottom:0;z-index:20;background:rgba(11,26,17,.92);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-top:1px solid var(--borda);padding-bottom:env(safe-area-inset-bottom,0px)}
.tabbar-in{max-width:560px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr)}
.tab{padding:9px 4px 8px;display:flex;flex-direction:column;align-items:center;gap:3px;
  color:var(--giz-apagado);border-top:2px solid transparent}
.tab .ico{font-size:19px;filter:grayscale(.7)}
.tab small{font-size:10.5px;font-weight:700;letter-spacing:.02em}
.tab.on{color:var(--ouro);border-top-color:var(--ouro)}
.tab.on .ico{filter:none}

/* ---------- Setup / login ---------- */
.centro{min-height:100vh;display:flex;flex-direction:column;justify-content:center;
  padding-top:24px;padding-bottom:60px;animation:subir .4s ease}
.h1{font-size:38px;font-weight:800;letter-spacing:-.02em;line-height:1.05;margin:10px 0 12px}
.lead{color:var(--giz-suave);font-size:15px;line-height:1.5;margin-bottom:28px}
.lbl{font-size:13px;font-weight:600;color:var(--giz-suave);display:block;margin-bottom:8px}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chips .pill{cursor:pointer;max-width:none}

.setup{padding-top:32px;padding-bottom:60px;animation:subir .4s ease}
.setup h2{font-size:26px;font-weight:800;letter-spacing:-.02em;margin:8px 0 6px}
.setup .lead{margin-bottom:22px}
.step{display:flex;gap:12px;margin-bottom:18px}
.step .n{width:26px;height:26px;border-radius:50%;background:var(--ouro-fundo);
  border:1px solid rgba(244,200,75,.45);color:var(--ouro);font-weight:800;font-size:13px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.step .tx{font-size:14px;line-height:1.55;color:var(--giz)}
.step .tx small{color:var(--giz-suave)}
pre.code{background:#0d1f14;border:1px solid var(--borda);border-radius:12px;padding:12px;
  font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;line-height:1.5;
  overflow-x:auto;margin:8px 0;color:#cfe8d6;white-space:pre}
.copy{margin-top:6px;font-size:12px;font-weight:700;color:var(--ouro);
  border:1px solid rgba(244,200,75,.45);border-radius:999px;padding:5px 12px}

main{padding:16px 16px calc(env(safe-area-inset-bottom,0px) + 150px);max-width:560px;margin:0 auto}
.bloco{display:flex;flex-direction:column;gap:12px;animation:subir .3s ease}
.gap8{display:flex;flex-direction:column;gap:8px}
.linhachips{display:flex;flex-wrap:wrap;gap:6px}

/* ---------- Aba Brasil ---------- */
.jbr-cab{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--giz-suave)}
.placarrow{display:flex;align-items:center;justify-content:center;gap:10px}
.ptime{display:flex;flex-direction:column;align-items:center;gap:4px;width:96px}
.ptime .pflag{font-size:34px;line-height:1}
.ptime .pnome{font-size:12px;font-weight:700;text-align:center;line-height:1.15}
.goread{width:54px;height:54px;border-radius:14px;background:rgba(255,255,255,.03);border:1.5px dashed var(--borda);
  color:var(--giz-suave);font-size:24px;font-weight:800;display:flex;align-items:center;justify-content:center}
.pgol{width:54px;height:54px;border-radius:14px;background:var(--card-alto);border:1.5px solid var(--borda);
  color:var(--giz);font-size:24px;font-weight:800;text-align:center;outline:none;-moz-appearance:textfield}
.pgol:focus{border-color:var(--ouro)}
.px{font-size:14px;color:var(--giz-apagado);font-weight:700}
.resband{margin-top:12px;text-align:center;font-size:12px;font-weight:800;letter-spacing:.06em;
  padding:6px;border-radius:10px}
.resband.v{background:var(--verde-fundo);color:var(--verde)}
.resband.e{background:var(--ouro-fundo);color:var(--ouro)}
.resband.d{background:var(--vermelho-fundo);color:var(--vermelho)}
.resband.aj{background:var(--card-alto);color:var(--giz-apagado)}
.xdel{position:absolute;top:10px;right:10px;width:26px;height:26px;border-radius:50%;
  background:var(--card-alto);border:1px solid var(--borda);color:var(--giz-apagado);font-size:12px}
.addrow{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.inputsm{padding:11px 12px;border-radius:12px;border:1.5px solid var(--borda);background:var(--card-alto);
  color:var(--giz);font-size:14px;outline:none;width:100%;-webkit-appearance:none;appearance:none}

.brsub{font-size:10.5px;font-weight:800;letter-spacing:.1em;color:var(--giz-apagado);margin:14px 0 8px;text-align:center}

/* ---------- Palpites cravados ---------- */
.tbtn:disabled{cursor:default}
.tbtn:disabled:not(.sel):not(.sel2){opacity:.45}
select.sel-camp:disabled{opacity:.7}
.lockband{background:var(--card);border:1px solid rgba(52,199,123,.35);border-radius:14px;
  padding:12px 14px;font-size:13px;line-height:1.5}
.btn-lock{background:transparent;border:1.5px solid rgba(244,200,75,.5);color:var(--ouro);font-size:14px;padding:13px}
.btn-lock:disabled{opacity:.4}
</style>
</head>

  return (p.length > 1 ? p[0][0]+p[1][0] : n.slice(0,2)).toUpperCase();

};

const normPick = v => typeof v === "string" ? { p1: v, p2: null } : (v || {});
const normTodos = p => { const o = {}; for (const k in (p || {})) o[k] = normPick(p[k]); return o; };
function alternar(sel, t) {
  const s = normPick(sel);
  if (s.p1 === t) return { ...s, p1: null };
  if (s.p2 === t) return { ...s, p2: null };
  if (!s.p1) return { ...s, p1: t };
  if (!s.p2) return { ...s, p2: t };
  return { ...s, p2: t };
}

function montarOficial() {
  const dbj = S.brJogos || {};
  const m = {};
  for (const f of JOGOS_BR_FIXOS) {
    const d = dbj[f.id] || {};
    m[f.id] = { id: f.id, fixo: true, ordem: d.ordem || f.ordem,
      fase: d.fase || f.fase, adv: ("adv" in d) ? d.adv : f.adv,
      data: d.data || f.data, kick: d.kick || f.kick || null, local: d.local || f.local,
      oficial: d.oficial || { b: null, a: null } };
  }
  for (const k in dbj) if (!m[k]) {
    const d = dbj[k];
    m[k] = { id: k, fixo: false, ordem: d.ordem || 0, fase: d.fase || "",
      adv: d.adv || null, data: d.data || "", kick: d.kick || null, local: d.local || "",
      oficial: d.oficial || { b: null, a: null } };
  }
  return m;
}

// formata epoch -> "Sáb 13/06 · 19h" (ou 19h30)
function fmtData(ms) {
  if (!ms) return "";
  const d = new Date(ms);
  const dias = ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
  const dd = String(d.getDate()).padStart(2,"0");
  const mm = String(d.getMonth()+1).padStart(2,"0");
  const h = d.getHours(), min = d.getMinutes();
  const hora = min ? `${h}h${String(min).padStart(2,"0")}` : `${h}h`;
  return `${dias[d.getDay()]} ${dd}/${mm} · ${hora}`;
}

function montarMeu() {

/* ---------- Pontuação ---------- */
function calcPontos(j, res) {
  let pts = 0, acertos = 0, definidos = 0, preenchidos = 0;
  for (const [letra] of GRUPOS) {
    const real = normPick(res.grupos[letra]);
    const meu = normPick(j.palpites && j.palpites[letra]);
    if (real.p1) { definidos++; if (meu.p1 === real.p1) { pts += 3; acertos++; } }
    if (real.p2) { definidos++; if (meu.p2 === real.p2) { pts += 2; acertos++; } }
    if (meu.p1) preenchidos++;
    if (meu.p2) preenchidos++;
  }
  const bonus = res.campeao && j.campeao === res.campeao ? 5 : 0;
  if (j.campeao) preenchidos++;
  return { acertos, definidos, bonus, pts: pts + bonus, preenchidos };
}

/* Pontos dos palpites de placar do Brasil (e jogos do mata-mata):
   placar exato = 3 pts; errou o placar mas acertou o vencedor/empate = 1 pt */
function calcBrasil(sl) {
  let pts = 0, exatos = 0, vencedor = 0;
  const preds = (S.brPalpites || {})[sl] || {};
  const jogos = S.brJogos || {};
  for (const gid in preds) {
    const of = jogos[gid] && jogos[gid].oficial;
    if (!of || of.b == null || of.b === "" || of.a == null || of.a === "") continue;
    const p = preds[gid];
    if (!p || p.b == null || p.a == null) continue;
    const pb = +p.b, pa = +p.a, ob = +of.b, oa = +of.a;
    if (pb === ob && pa === oa) { pts += 3; exatos++; }
    else if (Math.sign(pb - pa) === Math.sign(ob - oa)) { pts += 1; vencedor++; }
  }
  return { pts, exatos, vencedor };
}

let toastTimer = null;
function avisar(msg, tipo) {
  const t = $("#toast");
  if (!t) return;
  t.className = "toast" + (tipo === "erro" ? " erro" : "") +
    (precisaSavebar() ? " alto" : "");
  t.innerHTML = "<div>" + esc(msg) + "</div>";
  t.style.display = "flex";
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.style.display = "none"; }, 2600);
}

function draftKey(nome) { return "copa26:draft:" + slug(nome || ""); }
function lerDraft(nome) {
  try { const d = JSON.parse(localStorage.getItem(draftKey(nome)) || "null"); return d || null; }
  catch { return null; }
}
function salvarDraft() {
  if (!S.nome || S.travado) return;
  try { localStorage.setItem(draftKey(S.nome), JSON.stringify({ palpites: S.palpites, campeao: S.campeao })); } catch {}
}

function entrar(n) {
  const limpo = n.trim();
  if (!limpo) return;
  S.nome = limpo;
  localStorage.setItem("copa26:nome", limpo);
  const meu = S.jogadores.find(j => slug(j.nome) === slug(limpo));
  if (meu) {
    S.palpites = normTodos(meu.palpites);
    S.campeao = meu.campeao || null;
    S.travado = !!meu.travado;
    S.travadoEm = meu.travadoEm || null;
  } else {
    const d = lerDraft(limpo);
    S.palpites = d ? normTodos(d.palpites) : {};
    S.campeao = d ? d.campeao || null : null;
    S.travado = false; S.travadoEm = null;
  }
  S.brMeuTemp = montarMeu(); S.brOfTemp = montarOficial(); S.brSujo = false;
  S.sujo = false; S.salvoAs = null; S.aba = "palpites";
  render();
}

async function salvarPalpites(travar) {
  if (!S.nome || S.salvando || S.travado) return;
  S.salvando = true; render();
  let msg = "Palpites enviados e travados! Agora é torcer ⚽", tipo = "";
  try {
    const agora = Date.now();
    await set(ref(db, "bolao/jogadores/" + slug(S.nome)),
      { nome: S.nome, palpites: S.palpites, campeao: S.campeao, ts: agora,
        travado: true, travadoEm: agora });
    S.sujo = false; S.salvoAs = horaAgora();
    S.travado = true; S.travadoEm = agora;
    try { localStorage.removeItem(draftKey(S.nome)); } catch {}
  } catch (e) {
    msg = "Não consegui enviar. Tenta de novo."; tipo = "erro";
  }
  S.salvando = false; render(); avisar(msg, tipo);
}

async function salvarResultados() {
  if (S.salvandoRes) return;
  S.salvandoRes = true; render();
  let msg = "Resultados oficiais atualizados 🏆", tipo = "";
  try {
    await set(ref(db, "bolao/resultados"),
      { grupos: S.resTemp.grupos, campeao: S.resTemp.campeao, ts: Date.now() });
    S.resSujo = false;
  } catch (e) {
    msg = "Não consegui salvar os resultados."; tipo = "erro";
  }
  S.salvandoRes = false; render(); avisar(msg, tipo);
}

async function salvarBrasil() {
  if (S.salvandoBr || !S.nome) return;
  S.salvandoBr = true; pintarSavebar();
  let msg = "Seu palpite do Brasil foi salvo 🇧🇷", tipo = "";
  try {
    const sl = slug(S.nome);
    // parte do que já está salvo (preserva jogos que já começaram)
    const out = { ...((S.brPalpites || {})[sl] || {}) };
    for (const [gid, p] of Object.entries(S.brMeuTemp)) {
      if (jogoComecou(gid)) continue; // jogo começou: não mexe
      if (p && p.b != null && p.b !== "" && p.a != null && p.a !== "")
        out[gid] = { b: +p.b, a: +p.a };
      else delete out[gid];
    }
    await set(ref(db, "bolao/brasil/palpites/" + sl), out);
    S.brSujo = false;
  } catch (e) {
    msg = "Não consegui salvar."; tipo = "erro";
  }
  S.salvandoBr = false; render(); avisar(msg, tipo);
}

function htmlCardGrupo(letra, times, escolha, real, acao, trava) {
  const e = normPick(escolha), r = normPick(real);
  const sub = r.p1
    ? `<small style="color:var(--verde);font-weight:600">1º ${flagDe(r.p1)} ${esc(nomeDe(r.p1))}${r.p2 ? ` · 2º ${flagDe(r.p2)} ${esc(nomeDe(r.p2))}` : ""}</small>`
    : `<small class="apagado">Quem fica em 1º e 2º?</small>`;
  return `<div class="card"><div class="gcab"><span class="patch">${letra}</span>` +
    `<div><b>Grupo ${letra}</b>${sub}</div></div><div class="tgrid">` +
    times.map(id => {
      const pos = e.p1 === id ? "1" : e.p2 === id ? "2" : null;
      return htmlBotaoTime(id, pos, r.p1 === id, acao, letra, trava);
    }).join("") +

function abaPlacar() {

      return { ...j, p, br, total: p.pts + br.pts };

    .sort((a,b) => b.total - a.total || b.p.acertos - a.p.acertos ||
      b.br.exatos - a.br.exatos || b.p.preenchidos - a.p.preenchidos ||
      a.nome.localeCompare(b.nome,"pt-BR"));
  const algumOfBr = Object.values(S.brJogos || {}).some(g => g && g.oficial && g.oficial.b != null && g.oficial.a != null);
  const temRes = Object.keys(S.resultados.grupos).length > 0 || !!S.resultados.campeao || algumOfBr;
  const medalhas = ["🥇","🥈","🥉"];

  const linhas = ranking.length === 0
    ? `<div class="card" style="text-align:center;color:var(--giz-apagado);font-size:14px;padding:18px">Ninguém palpitou ainda. Seja o primeiro! 🎯</div>`
    : ranking.map((j,i) => {
        const partes = [];
        if (j.p.definidos > 0) partes.push(`${j.p.acertos} de ${j.p.definidos} posições`);
        if (j.p.bonus) partes.push("campeão ✓");
        if (j.br.pts) partes.push(`placar +${j.br.pts}`);
        const sub = partes.length ? partes.join(" · ") : `${j.p.preenchidos}/25 palpites feitos`;
        const medalha = temRes && i < 3 && j.total > 0;
        return `<div class="rank${i === 0 && j.total > 0 ? " lider" : ""}">` +
          `<span class="pos">${medalha ? medalhas[i] : `<i>${i+1}º</i>`}</span>` +
          avatarHtml(j.nome,36) +
          `<span class="info"><b>${esc(j.nome)}${j.travado ? ' <span style="font-size:11px">🔒</span>' : ""}</b><small>${sub}</small></span>` +
          `<span class="pts"><b>${j.total}</b><small>PTS</small></span></div>`;
      }).join("");

  const grupos = GRUPOS.map(([l]) => {
    const realN = normPick(S.resultados.grupos[l]);
    const temR = !!(realN.p1 || realN.p2);
    const cab = temR
      ? `<span style="color:var(--verde)">🏆 1º ${realN.p1 ? `${flagDe(realN.p1)} ${esc(nomeDe(realN.p1))}` : "—"}` +
        (realN.p2 ? `<span style="opacity:.8"> · 2º ${flagDe(realN.p2)} ${esc(nomeDe(realN.p2))}</span>` : "") + `</span>`
      : `<span class="apagado" style="font-weight:600">Em disputa</span>`;
    const chips = S.jogadores.length
      ? S.jogadores.map(j => htmlChipDuplo(j, normPick(j.palpites && j.palpites[l]), realN)).join("")
      : `<span class="apagado" style="font-size:12px">Sem palpites por enquanto.</span>`;
    return `<div class="card" style="padding:12px 14px">` +
      `<div class="gcab" style="margin-bottom:${S.jogadores.length ? 10 : 0}px">` +
      `<span class="patch sm">${l}</span><div style="font-size:13px;font-weight:700;flex:1">${cab}</div></div>` +
      `<div class="linhachips">${chips}</div></div>`;
  }).join("");

  const realC = S.resultados.campeao;
  const cabC = realC
    ? `<span style="color:var(--verde)">Campeão: ${flagDe(realC)} ${esc(nomeDe(realC))}</span>`
    : `<span class="apagado" style="font-weight:600">Campeão do mundo · final em 19/07</span>`;
  const chipsC = S.jogadores.length
    ? S.jogadores.map(j => htmlChip(j, j.campeao, realC)).join("")
    : `<span class="apagado" style="font-size:12px">Sem palpites por enquanto.</span>`;
  const cardC = `<div class="card" style="padding:12px 14px;border-color:rgba(244,200,75,.3)">` +
    `<div class="gcab" style="margin-bottom:${S.jogadores.length ? 10 : 0}px">` +
    `<span class="patch sm" style="font-size:13px">🏆</span>` +
    `<div style="font-size:13px;font-weight:700;flex:1">${cabC}</div></div>` +
    `<div class="linhachips">${chipsC}</div></div>`;

  return `<div class="bloco" style="gap:22px">` +
    `<section><div class="sec-title">CLASSIFICAÇÃO · ${ranking.length} ${ranking.length === 1 ? "PESSOA" : "PESSOAS"}</div>` +
    (!temRes ? `<div class="note" style="margin-bottom:10px">Os pontos aparecem conforme os resultados forem saindo. 1º colocado certo vale 3 pontos, 2º vale 2; acertar o placar de um jogo do Brasil vale 3 (ou 1 se acertar só o vencedor); e o campeão do mundo vale 5.</div>` : "") +
    `<div class="gap8">${linhas}</div></section>` +
    `<section><div class="sec-title">PALPITES POR GRUPO</div>` +
    `<div class="gap8">${grupos}${cardC}</div></section></div>`;
}

function abaResultados() {
  return `<div class="bloco">` +
    `<div class="aviso">⚠️ Aqui se marca o <b>resultado oficial</b> conforme os grupos forem terminando. Isso vale pra família inteira e define a pontuação de todo mundo.</div>` +
    GRUPOS.map(([l, ts]) => htmlCardGrupo(l, ts, S.resTemp.grupos[l], null, "respick")).join("") +
    htmlSeletorCampeao(S.resTemp.campeao, "rescampeao", "Campeão do mundo (oficial)") +
    `</div>`;
}

/* ---------- Aba Brasil ---------- */
function bandInfo(j) {
  const tem = j.b != null && j.b !== "" && j.a != null && j.a !== "";
  if (!tem) return { cls: "aj", tx: "A JOGAR" };
  const b = +j.b, a = +j.a;
  if (b > a) return { cls: "v", tx: "VITÓRIA · " + b + " × " + a };
  if (b < a) return { cls: "d", tx: "DERROTA · " + b + " × " + a };
  return { cls: "e", tx: "EMPATE · " + b + " × " + a };
}

function pintarSavebar() {
  const bar = document.querySelector(".savebar");
  if (!bar) return;
  bar.className = "savebar" + (precisaSavebar() ? " on" : "");
  if (S.aba === "brasil") {
    const bt = bar.querySelector("button");
    if (bt) { bt.disabled = S.salvandoBr || !S.brSujo; bt.textContent = S.salvandoBr ? "Salvando…" : "Salvar meu palpite"; }
  }
}

function participantes() {
  const arr = S.jogadores.slice();
  if (S.nome && !arr.some(j => slug(j.nome) === slug(S.nome))) arr.push({ nome: S.nome });
  return arr;
}

function htmlChipPlacar(j, pred, of) {
  const tem = pred && pred.b != null && pred.b !== "" && pred.a != null && pred.a !== "";
  const exato = tem && of && of.b != null && of.a != null && +pred.b === +of.b && +pred.a === +of.a;
  const tx = tem ? (pred.b + "×" + pred.a) : "—";
  return `<span class="chip${exato ? " ok" : ""}">${avatarHtml(j.nome, 18)}` +
    `<span style="font-weight:800">${tx}</span>${exato ? ` <span style="font-size:10px">✓</span>` : ""}</span>`;
}

function chipsHtml(id) {
  const ofObj = S.brOfTemp[id] ? S.brOfTemp[id].oficial : null;
  const parts = participantes();
  if (!parts.length) return `<span class="apagado" style="font-size:12px">Ninguém palpitou ainda.</span>`;
  return parts.map(j => {
    const sl = slug(j.nome);
    const pred = (S.nome && sl === slug(S.nome)) ? S.brMeuTemp[id] : ((S.brPalpites[sl] || {})[id]);
    return htmlChipPlacar(j, pred, ofObj);
  }).join("");
}

function refreshJogoBr(id) {
  const j = S.brOfTemp[id];
  if (j) {
    const bi = bandInfo(j.oficial || {});
    const band = document.getElementById("band-of-" + id);
    if (band) { band.className = "resband " + bi.cls; band.textContent = bi.tx; }
  }
  const chips = document.getElementById("chips-" + id);
  if (chips) chips.innerHTML = chipsHtml(id);
}

function htmlJogoBr(j) {
  const advFlag = j.adv ? flagDe(j.adv) : "❓";
  const advNome = j.adv ? nomeDe(j.adv) : "A definir";
  const of = j.oficial || {};
  const temOf = of.b != null && of.b !== "" && of.a != null && of.a !== "";
  const bi = bandInfo(of);
  const comecou = jogoComecou(j.id);
  const sl = S.nome ? slug(S.nome) : "";
  const salvo = (S.brPalpites[sl] || {})[j.id] || {};
  const meu = comecou ? salvo : (S.brMeuTemp[j.id] || {});
  const oficialRow =
    `<div class="placarrow">` +
      `<span class="ptime"><span class="pflag">🇧🇷</span><span class="pnome">Brasil</span></span>` +
      `<span class="goread">${temOf ? of.b : "–"}</span>` +
      `<span class="px">×</span>` +
      `<span class="goread">${temOf ? of.a : "–"}</span>` +
      `<span class="ptime"><span class="pflag">${advFlag}</span><span class="pnome">${esc(advNome)}</span></span>` +
    `</div>`;
  const meuRow = comecou
    ? `<div class="placarrow">` +
        `<span class="ptime"><span class="pflag">🇧🇷</span><span class="pnome">Brasil</span></span>` +
        `<span class="goread">${meu.b ?? "–"}</span>` +
        `<span class="px">×</span>` +
        `<span class="goread">${meu.a ?? "–"}</span>` +
        `<span class="ptime"><span class="pflag">${advFlag}</span><span class="pnome">${esc(advNome)}</span></span>` +
      `</div>` +
      `<div class="apagado" style="text-align:center;font-size:11.5px;margin-top:7px">🔒 Palpite fechado — o jogo já começou</div>`
    : `<div class="placarrow">` +
        `<span class="ptime"><span class="pflag">🇧🇷</span><span class="pnome">Brasil</span></span>` +
        `<input class="pgol" inputmode="numeric" maxlength="2" data-kind="me" data-id="${j.id}" data-lado="b" value="${meu.b ?? ""}">` +
        `<span class="px">×</span>` +
        `<input class="pgol" inputmode="numeric" maxlength="2" data-kind="me" data-id="${j.id}" data-lado="a" value="${meu.a ?? ""}">` +
        `<span class="ptime"><span class="pflag">${advFlag}</span><span class="pnome">${esc(advNome)}</span></span>` +
      `</div>`;
  return `<div class="card" style="position:relative">` +
    (!j.fixo ? `<button class="xdel" data-acao="delbr" data-id="${j.id}">✕</button>` : "") +
    `<div class="jbr-cab"><b style="color:var(--giz);font-weight:800;font-size:13px">${esc(j.fase)}</b><span>${esc(j.data || "")}</span></div>` +
    (j.local ? `<div class="apagado" style="font-size:11.5px;margin-top:2px">${esc(j.local)}</div>` : "") +
    `<div class="brsub">Resultado oficial</div>` + oficialRow +
    `<div class="resband ${bi.cls}" id="band-of-${j.id}">${bi.tx}</div>` +
    (S.nome ? `<div class="brsub">Seu palpite</div>` + meuRow : "") +
    `<div class="brsub">Palpites da galera</div>` +
    `<div class="linhachips" id="chips-${j.id}">${chipsHtml(j.id)}</div>` +
  `</div>`;
}

function abaBrasil() {
  if (!Object.keys(S.brOfTemp).length) S.brOfTemp = montarOficial();
  const lista = Object.values(S.brOfTemp).sort((x, y) => (x.ordem || 0) - (y.ordem || 0));
  const cards = lista.map(htmlJogoBr).join("");
  const form = S.brForm
    ? `<div class="card"><b style="font-size:15px;font-weight:800">Novo jogo do mata-mata</b>` +
      `<div class="addrow" style="margin-top:10px">` +
        `<select id="brFase" class="inputsm">` + FASES_MM.map(f => `<option>${f}</option>`).join("") + `</select>` +
        `<select id="brAdv" class="inputsm"><option value="">Adversário a definir</option>` +
          GRUPOS.flatMap(([, ts]) => ts).filter(id => id !== "BRA")
            .sort((a, b) => nomeDe(a).localeCompare(nomeDe(b), "pt-BR"))
            .map(id => `<option value="${id}">${flagDe(id)} ${esc(nomeDe(id))}</option>`).join("") +
        `</select></div>` +
      `<label style="display:block;font-size:11px;color:var(--giz-apagado);margin:10px 2px 4px">Início do jogo (trava o palpite quando começar)</label>` +
      `<input id="brData" type="datetime-local" class="inputsm">` +
      `<div style="display:flex;gap:8px;margin-top:10px">` +
        `<button class="btn btn-gold" style="padding:12px;font-size:14px" data-acao="addbr">Adicionar</button>` +
        `<button class="btn" style="padding:12px;font-size:14px;border:1px solid var(--borda);background:var(--card-alto)" data-acao="addbrtoggle">Cancelar</button>` +
      `</div></div>`
    : `<button class="btn" style="border:1.5px dashed rgba(244,200,75,.4);background:transparent;color:var(--ouro);font-size:14px;font-weight:700;padding:13px" data-acao="addbrtoggle">＋ Adicionar jogo do mata-mata</button>`;
  return `<div class="bloco">` +
    `<div class="suave" style="font-size:13px;line-height:1.5;padding:0 2px">Cada um informa só o <b>seu palpite de placar</b> dos jogos da Seleção — todo mundo vê o de todo mundo. O <b>resultado oficial</b> é preenchido depois que o jogo acaba e o app marca quem cravou o placar (✓). No mata-mata, adicione os jogos aqui embaixo. 🇧🇷</div>` +
    cards + form + `</div>`;
}

/* ---------- Render ---------- */
function render() {
  const app = $("#app");
  if (!S.pronto) {
    app.innerHTML = `<div class="wrap centro" style="align-items:center;text-align:center">` +
      `<div style="font-size:40px;animation:girar 1.6s linear infinite">⚽</div>` +
      `<div class="suave" style="margin-top:12px;font-size:14px">Aquecendo no gramado…</div></div>`;
    return;
  }
  if (!S.nome) {
    const vNome = $("#inome") ? $("#inome").value : "";
    app.innerHTML = telaLogin();
    const i = $("#inome");
    if (i && vNome) i.value = vNome;
    return;
  }

  const y = window.scrollY;
  const vF = $("#brFase") ? $("#brFase").value : null;
  const vA = $("#brAdv") ? $("#brAdv").value : null;
  const vD = $("#brData") ? $("#brData").value : "";
  const conteudo =
    S.aba === "palpites" ? abaPalpites() :
    S.aba === "placar" ? abaPlacar() :
    S.aba === "brasil" ? abaBrasil() : abaResultados();

  let stSave, btSave, btDis, acSave;
  if (S.aba === "palpites") {
    stSave = S.sujo
      ? `Alterações não salvas · ${calcPontos({palpites:S.palpites,campeao:S.campeao},S.resultados).preenchidos}/25`
      : `Salvo às ${S.salvoAs} ✓`;
    btSave = S.salvando ? "Salvando…" : "Salvar palpites";
    btDis = S.salvando || !S.sujo;
    acSave = "salvar";
  } else if (S.aba === "brasil") {
    stSave = "Palpite alterado";
    btSave = S.salvandoBr ? "Salvando…" : "Salvar meu palpite";
    btDis = S.salvandoBr || !S.brSujo;
    acSave = "salvarbr";
  } else {
    stSave = "Resultados alterados";
    btSave = S.salvandoRes ? "Salvando…" : "Salvar resultados";
    btDis = S.salvandoRes || !S.resSujo;
    acSave = "salvarres";
  }

  const tabs = [["palpites","Palpites","✏️"],["placar","Placar","🏆"],["brasil","Brasil","🇧🇷"],["resultados","Resultados","📋"]];

  app.innerHTML =
    `<header class="hd"><div class="hd-in">` +
      `<div class="hd-tit"><span class="eyebrow"><span class="dot${S.conectado ? "" : " off"}"></span>COPA 2026 ${S.conectado ? "· AO VIVO" : "· RECONECTANDO…"}</span>` +
      `<b>Bolão da Família</b></div>` +
      `<button class="pill" data-acao="trocar" title="Trocar de pessoa">${avatarHtml(S.nome,26)}<span>${esc(S.nome.split(" ")[0])}</span></button>` +
    `</div></header>` +
    `<main>${conteudo}</main>` +
    `<div class="savebar${precisaSavebar() ? " on" : ""}"><div class="savebar-in">` +
      `<span class="st">${stSave}</span>` +
      `<button data-acao="${acSave}"${btDis ? " disabled" : ""}>${btSave}</button>` +
    `</div></div>` +
    `<div id="toast" class="toast" style="display:none"></div>` +
    `<nav class="tabbar"><div class="tabbar-in">` +
      tabs.map(([id, rot, ico]) =>
        `<button class="tab${S.aba === id ? " on" : ""}" data-acao="aba" data-aba="${id}">` +
        `<span class="ico">${ico}</span><small>${rot}</small></button>`).join("") +
    `</div></nav>`;

  window.scrollTo(0, y);
  if (S.brForm) {
    if (vF !== null && $("#brFase")) $("#brFase").value = vF;
    if (vA !== null && $("#brAdv")) $("#brAdv").value = vA;
    if (vD && $("#brData")) $("#brData").value = vD;
  }
}

/* ---------- Eventos (delegação) ---------- */
document.addEventListener("click", e => {
  const el = e.target.closest("[data-acao]");
  if (!el) return;
  const a = el.getAttribute("data-acao");

  if (a === "entrar") { const i = $("#inome"); entrar(i ? i.value : ""); }
  if (a === "chip") entrar(el.getAttribute("data-nome"));
  if (a === "trocar") { S.nome = null; S.sujo = false; render(); }
  if (a === "aba") { S.aba = el.getAttribute("data-aba"); render(); }
  if (a === "salvarres") salvarResultados();
  if (a === "salvarbr") salvarBrasil();
  if (a === "enviar") {
    if (S.travado) return;
    const p = calcPontos({ palpites: S.palpites, campeao: S.campeao }, S.resultados).preenchidos;
    if (p < 25) { avisar("Complete os 25 palpites antes de enviar.", "erro"); return; }
    salvarPalpites(true);
  }

  if (a === "addbrtoggle") { S.brForm = !S.brForm; render(); }
  if (a === "addbr") {
    const fase = $("#brFase") ? $("#brFase").value : FASES_MM[0];
    const adv = $("#brAdv") ? $("#brAdv").value : "";
    const vD = $("#brData") ? $("#brData").value : "";
    const kick = vD ? new Date(vD).getTime() : null;
    const data = kick ? fmtData(kick) : "";
    const id = "x" + Date.now();
    const ordem = 100 + Object.keys(S.brOfTemp).length;
    const jogo = { ordem, fase, adv: adv || null, data, kick, local: "", oficial: { b: null, a: null } };
    S.brOfTemp[id] = { id, fixo: false, ...jogo };
    set(ref(db, "bolao/brasil/jogos/" + id), jogo);
    S.brForm = false; render();
  }
  if (a === "delbr") {
    const id = el.getAttribute("data-id");
    delete S.brOfTemp[id];
    set(ref(db, "bolao/brasil/jogos/" + id), null);
    render();
  }

  if (a === "pick") {
    if (S.travado) return;
    const g = el.getAttribute("data-g"), t = el.getAttribute("data-t");
    S.palpites[g] = alternar(S.palpites[g], t);
    S.sujo = true; salvarDraft(); render();
  }
  if (a === "respick") {
    const g = el.getAttribute("data-g"), t = el.getAttribute("data-t");
    S.resTemp.grupos[g] = alternar(S.resTemp.grupos[g], t);
    S.resSujo = true; render();
  }
});

document.addEventListener("change", e => {
  const el = e.target.closest("[data-acao]");
  if (!el) return;
  const a = el.getAttribute("data-acao");
  if (a === "campeao" && !S.travado) { S.campeao = el.value || null; S.sujo = true; salvarDraft(); render(); }
  if (a === "rescampeao") { S.resTemp.campeao = el.value || null; S.resSujo = true; render(); }
});

document.addEventListener("input", e => {
  const el = e.target;
  if (!el.classList || !el.classList.contains("pgol")) return;
  const id = el.getAttribute("data-id"), lado = el.getAttribute("data-lado"), kind = el.getAttribute("data-kind");
  const v = el.value.replace(/\D/g, "").slice(0, 2);
  if (el.value !== v) el.value = v;
  const val = v === "" ? null : +v;
  if (kind === "me") {
    if (jogoComecou(id)) return; // jogo começou: palpite travado
    (S.brMeuTemp[id] = S.brMeuTemp[id] || { b: null, a: null })[lado] = val;
  } else {
    const j = S.brOfTemp[id]; if (!j) return;
    (j.oficial = j.oficial || { b: null, a: null })[lado] = val;
  }
  S.brSujo = true;
  refreshJogoBr(id);
  pintarSavebar();
});

document.addEventListener("keydown", e => {
  if (e.key === "Enter" && e.target && e.target.id === "inome") entrar(e.target.value);
});

// trava automática: ao cruzar o horário de início de um jogo, re-renderiza
let _comecadosVistos = {};
setInterval(() => {
  let mudou = false;
  for (const gid in (S.brOfTemp || {})) {
    const c = jogoComecou(gid);
    if (c && !_comecadosVistos[gid]) { _comecadosVistos[gid] = true; mudou = true; }
  }
  if (mudou && S.aba === "brasil") renderSeguro();
}, 20000);

render();
}
</script>
</body>
</html>
